name: Helm PR Flow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  check_helm_versions:
    name: Check Helm Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.3
      - name: prepate yq
        run: |
          curl https://github.com/mikefarah/yq/releases/download/`curl --silent "https://api.github.com/repos/mikefarah/yq/releases/latest" | grep -Po '"tag_name": "\K.*?(?=")'`/yq_linux_amd64 -L -o yq
          chmod 755 yq
      - name: bumper
        run: |
          case "${{ github.event.pull_request.title }}" in
            fix:*)
            RELEASE_TYPE=minor
            ;;
            release:*)
            RELEASE_TYPE=major
            ;;
            *)
            RELEASE_TYPE=patch
            ;;
          esac
          echo Release type is $RELEASE_TYPE
          changed=""
          reqsubstr="charts/"
          changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          for file in $changed_files; do
            if [ -z "${file##*$reqsubstr*}" ] ;
            then
              chartName=$(echo $file | awk -F "/" '{print $2}')
              if [[ ! $changed =~ $chartName ]];
              then
                changed="$changed $chartName"
              fi
            fi
          done
          echo Changed Charts are: $changed
          for chart in $changed; do
            if git rev-parse "${chart}-$(yq '.version' charts/${chart}/Chart.yaml)" >/dev/null 2>&1;
            then
              echo "Release ${chart}-$(yq '.version' charts/${chart}/Chart.yaml) already exists"
              echo "changing version on $RELEASE_TYPE"
              CURRENT_CHART_VERSION=$(./yq eval '.version' charts/${chart}/Chart.yaml)
              IFS='.' read -r major minor patch <<< "${CURRENT_CHART_VERSION}"
              case "${RELEASE_TYPE}" in
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                patch)
                  patch=$((patch + 1))
                  ;;
                *)
                  echo "Unsupported RELEASE_TYPE: ${RELEASE_TYPE}"
                  exit 1
                  ;;
              esac
              NEXT_CHART_VERSION="${major}.${minor}.${patch}"
              ./yq -i ".version = \"${NEXT_CHART_VERSION}\"" charts/${chart}/Chart.yaml
            else
              echo "Unique release number for this chart (${chart}), skipping"
            fi
          done
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
            message: 'Commited new chart versions'
  update_readme:
    runs-on: ubuntu-latest
    name: Readme Updater
    needs: check_helm_versions
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Run helm-docs
        run: |
          GOBIN=$PWD GO111MODULE=on go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
          ./helm-docs --sort-values-order file --skip-version-footer
          rm helm-docs

      - name: Commit bump
        uses: EndBug/add-and-commit@v10
        with:
            message: 'Regenerate chart README.md'
  helmcheck:
    runs-on: ubuntu-latest
    name: Perform Helm Compatibility Checks
    needs: update_readme
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download Pluto
        uses: FairwindsOps/pluto/github-action@master

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.3

      - name: Add repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Add dependencies
        run: |
          set -E
          for chart in $(ls -b charts/); do
            helm dependency update charts/${chart}
          done
      - name: Check compatibility
        run: |
          set -E
          for chart in $(ls -b charts/); do
            helm template charts/${chart} | pluto detect --target-versions k8s=v1.16.0 -
          done
