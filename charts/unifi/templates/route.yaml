{{- if .Values.httpRoute.enabled }}
{{- $fullName := include "unifi.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: {{ .Values.httpRoute.apiVersion }}
kind: {{ .Values.httpRoute.kind }}
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifi.labels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    {{- range .filters }}
    {{- end }}
    - backendRefs:
      {{- if $.Values.gatewayBackend.enabled }}
      - group: gateway.envoyproxy.io
        kind: Backend
        name: {{ $fullName }}
        weight: 1      
      {{- else }}
      - group: ""
        kind: Service
        name: {{ $fullName }}
        port: {{ $svcPort }}
        weight: 1
      {{- end }}
      {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      sessionPersistence:
        type: Cookie
        sessionName: UNIFI_SESSION
      {{- if .filters }}
      filters:
      {{- with .filters }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
