{{- if .Values.httpRoute.enabled }}
{{- $fullName := include "unifi.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: {{ .Values.httpRoute.apiVersion }}
kind: {{ .Values.httpRoute.kind }}
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifi.labels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    {{- $isRedirect := false }}
    {{- range .filters }}
    {{- if eq (.type | default "") "RequestRedirect" }}
    {{- $isRedirect = true }}
    {{- end }}
    {{- end }}
      {{- if not $isRedirect }}
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 1
      {{- end }}
      sessionPersistence:
        sessionPersistenceMode: Cookie
        cookieConfig:
          name: UNIFI_SESSION
      {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (.filters) ($.Values.gatewayBackend.enabled) }}
      filters:
      {{- with .filters }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.gatewayBackend.enabled }}
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: Backend
            name: {{ $fullName }}
      {{- end }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
